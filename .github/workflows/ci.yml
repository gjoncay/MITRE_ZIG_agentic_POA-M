name: verification

on:
  push:
  pull_request:

jobs:
  backend-and-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install minimal test dependencies
        run: >-
          python -m pip install --upgrade pip
          && python -m pip install
          networkx pandas openpyxl fastapi uvicorn python-multipart httpx pytest
      - name: Test graph, mapping, adapter, lifecycle, and graph-tool invariants
        run: python -m pytest -q tests webapp/backend/tests
      - name: Compile Python sources
        run: python -m py_compile run_analyst_pipeline.py scripts/*.py webapp/backend/*.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json
      - name: Type-check and build
        run: npm ci && npm run build
