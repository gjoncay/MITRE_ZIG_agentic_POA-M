# MITRE CSD-H web UI + Tailscale sidecar (per-app URL).
# Full recipe & gotchas: ./TAILSCALE_SIDECAR.md
#
# Reachable only at https://mitre-csdh.dikdik-macaroni.ts.net (tailnet-only).
# Start: `cp .env.example .env` + paste TS_AUTHKEY (and optionally LLM_PROVIDER /
# API keys), then `docker compose up -d`.
#
# NOTE: this Docker/Tailscale/web-UI layer is entirely separate from the
# air-gapped CLI/backend pipeline (see Air_Gapped_Deployment_Guide.md) — it is
# NOT part of that port and is not required to use the graph engine offline.

name: mitre-csdh

services:
  # ---- the app: FastAPI backend serving the built React frontend ----
  app:
    build: .
    restart: unless-stopped
    # No `ports:` — Tailscale is the only ingress (stays off the LAN).
    # Lets the container reach a locally-hosted LLM (e.g. Ollama) running on the
    # HOST machine at 127.0.0.1 — "localhost" inside the container means the
    # container itself, not the host, so LOCAL_LLM_BASE_URL should point at
    # http://host.docker.internal:<port> instead. Ollama also needs OLLAMA_HOST=
    # 0.0.0.0 host-side (see TAILSCALE_SIDECAR.md's sibling note in README.md) —
    # it defaults to 127.0.0.1-only, which this container can't reach either way.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-none}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LOCAL_LLM_BASE_URL=${LOCAL_LLM_BASE_URL:-}
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-}
    volumes:
      # Bind mounts (not named volumes) so reports/uploads are visible on the
      # host filesystem and inspectable with a normal text editor.
      - ./reports:/app/reports
      - ./webapp/backend/uploads:/app/webapp/backend/uploads
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---- Tailscale sidecar: https://mitre-csdh.dikdik-macaroni.ts.net ----
  app-ts:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    network_mode: service:app             # shares app's netns -> proxy 127.0.0.1:8000
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?set TS_AUTHKEY in .env (see ./TAILSCALE_SIDECAR.md)}
      - TS_HOSTNAME=mitre-csdh              # becomes the URL subdomain
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_SERVE_CONFIG=/config/mitre-csdh.json
    volumes:
      - apptsdata:/var/lib/tailscale
      - ./tailscale/mitre-csdh.json:/config/mitre-csdh.json:ro

volumes:
  apptsdata:
